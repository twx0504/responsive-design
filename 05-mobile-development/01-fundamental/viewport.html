<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- We commented out the viewport meta tag -->
    <!-- Tell a mobile browser to use the viewport width instead of the default 980px as the width of the screen, -->
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>Viewport</title>
    <style>
      body {
        margin: 0;
      }
      div {
        /* width: 300px; */

        /* Same as the default mobile layout viewport width 980px */
        /* width: 980px; */

        /* Width > 980px, the horizontal scrollbar will appear */
        width: 1000px;
        height: 300px;
        background-image: linear-gradient(to right, pink, skyblue);
      }
    </style>
  </head>
  <!-- html & body without the viewport meta tag will have a width of 980px for most mobile phones -->
  <body>
    <div></div>
  </body>
</html>
